<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwimbi Analytic Dashboard</title>
   
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        iframe {
            width: 100%;
            height: 80vh;
        }
    </style>
</head>
<body>
    
    <header>
    <img src="logo KIWIMBI.png" alt="Kiwimbi Logo" class="logo">
    </header>
    <h2 id="welcome-text"></h2>

    <h2>Kiwimbi Analytic Dashboard</h2>

    <iframe 
        src="https://lookerstudio.google.com/embed/reporting/d964450f-e7ef-4f3b-b652-49cef2330b6a/page/txsqF"
        frameborder="0"
        allowfullscreen>
    </iframe>

<script>
    const text = "Welcome to Kiwimbi Analytic Dashboard";
    let index = 0;
    const speed = 80; // typing speed in milliseconds

    function typeWriter() {
        if (index < text.length) {
            document.getElementById("welcome-text").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeWriter, speed);
        }
    }

    window.onload = typeWriter;
</script>
</body>

</footer>
</html>
